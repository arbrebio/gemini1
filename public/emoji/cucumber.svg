<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#022c22" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="50%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="tip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
  </defs>
  <style>
    #cuc { animation: float 3s ease-in-out infinite; transform-origin: 32px 32px; }
    @keyframes float { 0%,100%{transform:translateY(0) rotate(-20deg)} 50%{transform:translateY(-4px) rotate(-20deg)} }
  </style>
  <g filter="url(#sh)">
    <g id="cuc">
      <!-- Body -->
      <rect x="14" y="20" width="36" height="24" rx="12" fill="url(#skin)"/>
      <!-- Stripes -->
      <rect x="18" y="20" width="3" height="24" rx="1.5" fill="url(#tip)" opacity="0.4"/>
      <rect x="25" y="20" width="3" height="24" rx="1.5" fill="url(#tip)" opacity="0.4"/>
      <rect x="32" y="20" width="3" height="24" rx="1.5" fill="url(#tip)" opacity="0.4"/>
      <rect x="39" y="20" width="3" height="24" rx="1.5" fill="url(#tip)" opacity="0.4"/>
      <!-- End tips -->
      <ellipse cx="14" cy="32" rx="5" ry="12" fill="url(#tip)"/>
      <ellipse cx="50" cy="32" rx="5" ry="12" fill="url(#tip)"/>
      <!-- Small nubs -->
      <ellipse cx="20" cy="22" rx="2" ry="1.5" fill="#4ade80" opacity="0.6"/>
      <ellipse cx="30" cy="21" rx="2" ry="1.5" fill="#4ade80" opacity="0.6"/>
      <ellipse cx="42" cy="22" rx="2" ry="1.5" fill="#4ade80" opacity="0.6"/>
      <ellipse cx="24" cy="42" rx="2" ry="1.5" fill="#4ade80" opacity="0.6"/>
      <ellipse cx="36" cy="43" rx="2" ry="1.5" fill="#4ade80" opacity="0.6"/>
      <!-- Shine -->
      <ellipse cx="22" cy="26" rx="6" ry="3" fill="rgba(255,255,255,0.3)" transform="rotate(-10 22 26)"/>
    </g>
  </g>
</svg>
