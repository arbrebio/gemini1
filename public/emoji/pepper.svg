<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#022c22" flood-opacity="0.4"/>
    </filter>
    <radialGradient id="pep" cx="38%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#bbf7d0"/>
      <stop offset="40%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#14532d"/>
    </radialGradient>
    <linearGradient id="stem" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <style>
    #pep { animation: float 3s ease-in-out infinite; transform-origin: 32px 36px; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  </style>
  <g filter="url(#sh)">
    <g id="pep">
      <!-- Stem -->
      <path d="M32 14 Q28 8 24 10" stroke="url(#stem)" stroke-width="3" fill="none" stroke-linecap="round"/>
      <rect x="30" y="10" width="4" height="8" rx="2" fill="url(#stem)"/>
      <!-- Left lobe -->
      <path d="M32 20 C20 20 12 28 12 38 C12 48 20 56 28 54 L32 50" fill="url(#pep)"/>
      <!-- Right lobe -->
      <path d="M32 20 C44 20 52 28 52 38 C52 48 44 56 36 54 L32 50" fill="url(#pep)"/>
      <!-- Bottom lobe -->
      <path d="M26 48 C22 52 24 58 32 58 C40 58 42 52 38 48" fill="url(#pep)"/>
      <!-- Center dividers -->
      <line x1="32" y1="20" x2="32" y2="50" stroke="#14532d" stroke-width="1.5" opacity="0.4"/>
      <path d="M32 36 L22 32 M32 36 L42 32" stroke="#14532d" stroke-width="1" opacity="0.3"/>
      <!-- Shine -->
      <ellipse cx="22" cy="28" rx="5" ry="8" fill="rgba(255,255,255,0.3)" transform="rotate(-20 22 28)"/>
    </g>
  </g>
</svg>
