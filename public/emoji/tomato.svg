<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#7f1d1d" flood-opacity="0.45"/>
    </filter>
    <radialGradient id="tomato" cx="38%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="40%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="28%" r="32%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.7)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="stem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
  </defs>
  <style>
    #tom { animation: float 3s ease-in-out infinite; transform-origin: 32px 36px; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  </style>
  <g filter="url(#sh)">
    <g id="tom">
      <!-- Stem leaves -->
      <path d="M32 14 Q28 8 22 10 Q26 14 32 16" fill="url(#stem)"/>
      <path d="M32 14 Q36 8 42 10 Q38 14 32 16" fill="url(#stem)"/>
      <rect x="30" y="10" width="4" height="8" rx="2" fill="url(#stem)"/>
      <!-- Tomato body -->
      <circle cx="32" cy="36" r="22" fill="url(#tomato)"/>
      <circle cx="32" cy="36" r="22" fill="url(#shine)"/>
      <!-- Ribs -->
      <path d="M32 16 Q26 26 32 36" stroke="#b91c1c" stroke-width="1" fill="none" opacity="0.4"/>
      <path d="M32 16 Q38 26 32 36" stroke="#b91c1c" stroke-width="1" fill="none" opacity="0.4"/>
    </g>
  </g>
</svg>
