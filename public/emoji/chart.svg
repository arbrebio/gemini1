<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#022c22" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="b1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="b2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="b3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="b4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <style>
    #chart { animation: float 3s ease-in-out infinite; transform-origin: 32px 50px; }
    #b1a { animation: grow 2s ease-out infinite 0s; transform-origin: 12px 50px; }
    #b2a { animation: grow 2s ease-out infinite 0.2s; transform-origin: 24px 50px; }
    #b3a { animation: grow 2s ease-out infinite 0.4s; transform-origin: 36px 50px; }
    #b4a { animation: grow 2s ease-out infinite 0.6s; transform-origin: 48px 50px; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes grow { 0%{transform:scaleY(0.85)} 40%{transform:scaleY(1.05)} 100%{transform:scaleY(1)} }
  </style>
  <g filter="url(#sh)">
    <g id="chart">
      <!-- Axes -->
      <line x1="8" y1="8" x2="8" y2="54" stroke="#065f46" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="8" y1="54" x2="58" y2="54" stroke="#065f46" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Bars -->
      <rect id="b1a" x="12" y="34" width="10" height="20" rx="3" fill="url(#b1)"/>
      <rect id="b2a" x="24" y="24" width="10" height="30" rx="3" fill="url(#b2)"/>
      <rect id="b3a" x="36" y="18" width="10" height="36" rx="3" fill="url(#b3)"/>
      <rect id="b4a" x="48" y="10" width="8" height="44" rx="3" fill="url(#b4)"/>
      <!-- Bar tops shine -->
      <rect x="13" y="35" width="8" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
      <rect x="25" y="25" width="8" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
      <rect x="37" y="19" width="8" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
      <rect x="49" y="11" width="6" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
      <!-- Trend line -->
      <polyline points="17,34 29,24 41,18 52,10" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
