<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#78350f" flood-opacity="0.4"/>
    </filter>
    <radialGradient id="bulb" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="45%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d1d5db"/>
      <stop offset="100%" stop-color="#6b7280"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    #bulb-g { animation: glow 1.8s ease-in-out infinite; transform-origin: 32px 28px; }
    #glow-aura { animation: aura 1.8s ease-in-out infinite; }
    @keyframes glow { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.25)} }
    @keyframes aura { 0%,100%{opacity:0.4} 50%{opacity:0.9} }
  </style>
  <g filter="url(#sh)">
    <ellipse id="glow-aura" cx="32" cy="30" rx="22" ry="22" fill="url(#glow)"/>
    <g id="bulb-g">
      <!-- Glass globe -->
      <path d="M32 8 C20 8 12 16 12 26 C12 34 17 40 24 44 L24 50 L40 50 L40 44 C47 40 52 34 52 26 C52 16 44 8 32 8Z" fill="url(#bulb)"/>
      <!-- Base segments -->
      <rect x="24" y="50" width="16" height="4" rx="1" fill="url(#base)"/>
      <rect x="25" y="54" width="14" height="4" rx="1" fill="url(#base)"/>
      <rect x="27" y="58" width="10" height="3" rx="1" fill="url(#base)"/>
      <!-- Filament -->
      <path d="M26 40 Q28 34 32 30 Q36 34 38 40" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.7"/>
      <!-- Shine -->
      <ellipse cx="24" cy="18" rx="5" ry="8" fill="rgba(255,255,255,0.4)" transform="rotate(-20 24 18)"/>
    </g>
  </g>
</svg>
