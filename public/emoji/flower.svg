<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#4a044e" flood-opacity="0.4"/>
    </filter>
    <radialGradient id="petal" cx="50%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#9d174d"/>
    </radialGradient>
    <radialGradient id="center" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>
  <style>
    #flower { animation: float 3s ease-in-out infinite; transform-origin: 32px 32px; }
    #petals { animation: spin 6s linear infinite; transform-origin: 32px 32px; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
  </style>
  <g filter="url(#sh)">
    <g id="flower">
      <g id="petals">
        <ellipse cx="32" cy="14" rx="7" ry="12" fill="url(#petal)"/>
        <ellipse cx="32" cy="50" rx="7" ry="12" fill="url(#petal)"/>
        <ellipse cx="14" cy="32" rx="12" ry="7" fill="url(#petal)"/>
        <ellipse cx="50" cy="32" rx="12" ry="7" fill="url(#petal)"/>
        <ellipse cx="18" cy="18" rx="7" ry="12" fill="url(#petal)" transform="rotate(45 18 18)"/>
        <ellipse cx="46" cy="46" rx="7" ry="12" fill="url(#petal)" transform="rotate(45 46 46)"/>
        <ellipse cx="46" cy="18" rx="7" ry="12" fill="url(#petal)" transform="rotate(-45 46 18)"/>
        <ellipse cx="18" cy="46" rx="7" ry="12" fill="url(#petal)" transform="rotate(-45 18 46)"/>
      </g>
      <!-- Center -->
      <circle cx="32" cy="32" r="11" fill="url(#center)"/>
      <circle cx="32" cy="32" r="6" fill="#fbbf24"/>
      <!-- Center shine -->
      <ellipse cx="29" cy="29" rx="3" ry="2" fill="rgba(255,255,255,0.5)"/>
    </g>
  </g>
</svg>
