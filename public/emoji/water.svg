<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#0c4a6e" flood-opacity="0.45"/>
    </filter>
    <radialGradient id="drop" cx="38%" cy="30%" r="62%">
      <stop offset="0%" stop-color="#bae6fd"/>
      <stop offset="45%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="28%" r="35%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.75)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <style>
    #wd { animation: drip 2.5s ease-in-out infinite; transform-origin: 32px 38px; }
    @keyframes drip { 0%,100%{ transform:translateY(0) scaleY(1); } 40%{ transform:translateY(-4px) scaleY(0.97); } 70%{ transform:translateY(2px) scaleY(1.04); } }
  </style>
  <g filter="url(#sh)">
    <ellipse cx="32" cy="56" rx="12" ry="3.5" fill="#0369a1" opacity="0.2"/>
    <g id="wd">
      <path d="M32 10 C32 10 14 30 14 40 C14 50 22 57 32 57 C42 57 50 50 50 40 C50 30 32 10 32 10Z" fill="url(#drop)"/>
      <path d="M32 10 C32 10 14 30 14 40 C14 50 22 57 32 57 C42 57 50 50 50 40 C50 30 32 10 32 10Z" fill="url(#shine)"/>
      <ellipse cx="24" cy="30" rx="5" ry="9" fill="rgba(255,255,255,0.35)" transform="rotate(-20 24 30)"/>
    </g>
  </g>
</svg>
