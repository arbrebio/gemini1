<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#022c22" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="right" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="floor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
  </defs>
  <style>
    #tent { animation: float 3s ease-in-out infinite; transform-origin: 32px 50px; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  </style>
  <g filter="url(#sh)">
    <g id="tent">
      <!-- Ground -->
      <ellipse cx="32" cy="54" rx="28" ry="5" fill="url(#floor)" opacity="0.7"/>
      <!-- Left face -->
      <path d="M32 8 L4 52 L32 52 Z" fill="url(#left)"/>
      <!-- Right face -->
      <path d="M32 8 L60 52 L32 52 Z" fill="url(#right)"/>
      <!-- Door arch -->
      <path d="M24 52 L24 38 Q32 30 40 38 L40 52" fill="#064e3b" opacity="0.6"/>
      <!-- Roof ridge line -->
      <line x1="32" y1="8" x2="32" y2="52" stroke="#065f46" stroke-width="1" opacity="0.4"/>
      <!-- Shine on left face -->
      <ellipse cx="18" cy="28" rx="5" ry="12" fill="rgba(255,255,255,0.2)" transform="rotate(-35 18 28)"/>
      <!-- Stakes -->
      <line x1="4" y1="52" x2="2" y2="58" stroke="#78350f" stroke-width="2" stroke-linecap="round"/>
      <line x1="60" y1="52" x2="62" y2="58" stroke="#78350f" stroke-width="2" stroke-linecap="round"/>
      <!-- Rope -->
      <line x1="2" y1="58" x2="32" y2="8" stroke="#d97706" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
      <line x1="62" y1="58" x2="32" y2="8" stroke="#d97706" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
    </g>
  </g>
</svg>
