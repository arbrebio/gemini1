<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="lid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="60%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>
  <style>
    #lap { animation: float 3s ease-in-out infinite; transform-origin: 32px 44px; }
    #glow { animation: glow 2s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes glow { 0%,100%{opacity:0.8} 50%{opacity:1} }
  </style>
  <g filter="url(#sh)">
    <g id="lap">
      <!-- Base/keyboard -->
      <rect x="6" y="44" width="52" height="10" rx="3" fill="url(#base)"/>
      <ellipse cx="32" cy="44" rx="8" ry="1.5" fill="#1e293b" opacity="0.5"/>
      <!-- Lid -->
      <rect x="10" y="12" width="44" height="32" rx="4" fill="url(#lid)"/>
      <!-- Screen bezel inner -->
      <rect x="13" y="15" width="38" height="26" rx="2" fill="url(#screen)" id="glow"/>
      <!-- Screen content (chart lines) -->
      <polyline points="16,36 22,30 28,33 34,22 40,27 46,18" stroke="#34d399" stroke-width="1.5" fill="none" opacity="0.9"/>
      <line x1="16" y1="38" x2="46" y2="38" stroke="#6ee7b7" stroke-width="0.7" opacity="0.5"/>
      <line x1="16" y1="34" x2="46" y2="34" stroke="#6ee7b7" stroke-width="0.7" opacity="0.3"/>
      <!-- Screen shine -->
      <rect x="14" y="16" width="18" height="8" rx="1" fill="rgba(255,255,255,0.08)"/>
      <!-- Trackpad -->
      <rect x="25" y="47" width="14" height="4" rx="2" fill="#1e293b" opacity="0.4"/>
    </g>
  </g>
</svg>
