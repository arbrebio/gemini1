<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="40%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="wg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>
  <style>
    #wrench { animation: float 3s ease-in-out infinite; transform-origin: 32px 32px; }
    @keyframes float { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-4px) rotate(-5deg)} }
  </style>
  <g filter="url(#sh)">
    <g id="wrench" transform="rotate(-30 32 32)">
      <!-- Handle -->
      <rect x="28" y="22" width="8" height="32" rx="4" fill="url(#wg)"/>
      <!-- Head open jaw -->
      <path d="M22 10 C22 6 26 4 30 6 L30 20 L22 20 Z" fill="url(#wg)"/>
      <path d="M42 10 C42 6 38 4 34 6 L34 20 L42 20 Z" fill="url(#wg)"/>
      <rect x="22" y="18" width="20" height="6" rx="2" fill="url(#wg2)"/>
      <!-- Shine on handle -->
      <rect x="30" y="24" width="3" height="20" rx="1.5" fill="rgba(255,255,255,0.35)"/>
      <!-- Shine on head -->
      <rect x="24" y="10" width="3" height="12" rx="1.5" fill="rgba(255,255,255,0.25)"/>
    </g>
  </g>
</svg>
