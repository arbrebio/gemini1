<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#022c22" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="hg2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <style>
    #hs { animation: float 3s ease-in-out infinite; transform-origin: 32px 32px; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  </style>
  <g filter="url(#sh)">
    <g id="hs">
      <!-- Left arm -->
      <path d="M4 38 L20 30 L26 34 L32 32" stroke="url(#hg)" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Right arm -->
      <path d="M60 38 L44 30 L38 34 L32 32" stroke="url(#hg2)" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Clasped center -->
      <ellipse cx="32" cy="32" rx="8" ry="6" fill="url(#hg)"/>
      <ellipse cx="32" cy="32" rx="8" ry="6" fill="rgba(255,255,255,0.2)"/>
      <!-- Left fingers -->
      <rect x="22" y="22" width="5" height="10" rx="2.5" fill="url(#hg2)" transform="rotate(-10 24 27)"/>
      <rect x="28" y="20" width="5" height="11" rx="2.5" fill="url(#hg2)" transform="rotate(-5 30 25)"/>
      <!-- Right fingers -->
      <rect x="37" y="22" width="5" height="10" rx="2.5" fill="url(#hg)" transform="rotate(10 40 27)"/>
      <rect x="31" y="20" width="5" height="11" rx="2.5" fill="url(#hg)" transform="rotate(5 34 25)"/>
      <!-- Shine -->
      <ellipse cx="27" cy="28" rx="4" ry="2.5" fill="rgba(255,255,255,0.3)" transform="rotate(-10 27 28)"/>
    </g>
  </g>
</svg>
