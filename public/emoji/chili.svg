<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#7f1d1d" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="chili" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="40%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="stem" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <style>
    #chili { animation: float 3s ease-in-out infinite; transform-origin: 32px 32px; }
    @keyframes float { 0%,100%{transform:translateY(0) rotate(15deg)} 50%{transform:translateY(-5px) rotate(15deg)} }
  </style>
  <g filter="url(#sh)">
    <g id="chili">
      <!-- Stem and leaf -->
      <path d="M36 12 Q42 6 46 8 Q42 14 36 16" fill="url(#stem)"/>
      <rect x="33" y="8" width="4" height="10" rx="2" fill="url(#stem)"/>
      <!-- Chili body -->
      <path d="M34 18 C40 18 46 24 46 34 C46 46 40 56 36 58 C32 60 28 56 28 52 C26 44 26 36 30 26 C28 20 30 18 34 18Z" fill="url(#chili)"/>
      <!-- Tip curl -->
      <path d="M36 58 C30 62 26 58 28 52" stroke="#7f1d1d" stroke-width="2" fill="none"/>
      <!-- Shine -->
      <ellipse cx="30" cy="28" rx="3" ry="10" fill="rgba(255,255,255,0.3)" transform="rotate(-10 30 28)"/>
    </g>
  </g>
</svg>
