<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#0c4a6e" flood-opacity="0.4"/>
    </filter>
    <radialGradient id="ocean" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="45%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="28%" r="35%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <style>
    #earth { animation: float 4s ease-in-out infinite; transform-origin: 32px 32px; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  </style>
  <g filter="url(#sh)">
    <g id="earth">
      <circle cx="32" cy="32" r="27" fill="url(#ocean)"/>
      <!-- Africa/Europe landmass -->
      <path d="M30 12 C34 12 38 16 36 20 C40 22 42 28 40 32 C44 34 44 40 40 44 C38 50 34 52 30 50 C26 48 24 42 26 38 C22 36 22 30 26 26 C24 20 26 12 30 12Z" fill="#4ade80"/>
      <!-- South America -->
      <path d="M18 28 C22 26 24 30 22 36 C22 42 18 46 16 42 C12 38 14 30 18 28Z" fill="#34d399"/>
      <!-- North America -->
      <path d="M14 18 C18 16 22 20 20 26 C18 28 14 26 12 22 C10 20 12 18 14 18Z" fill="#4ade80"/>
      <!-- Asia -->
      <path d="M42 16 C46 16 50 20 50 26 C50 30 46 32 44 30 C42 32 40 28 40 24 C38 20 40 16 42 16Z" fill="#34d399"/>
      <circle cx="32" cy="32" r="27" fill="url(#shine)"/>
    </g>
  </g>
</svg>
