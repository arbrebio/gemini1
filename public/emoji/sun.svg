<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#92400e" flood-opacity="0.4"/>
    </filter>
    <radialGradient id="core" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <linearGradient id="ray" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <style>
    #rays { animation: spin 8s linear infinite; transform-origin: 32px 32px; }
    #glow { animation: pulse 2s ease-in-out infinite; transform-origin: 32px 32px; }
    @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.08);opacity:0.85} }
  </style>
  <g filter="url(#sh)">
    <g id="rays">
      <ellipse cx="32" cy="8" rx="3.5" ry="6.5" fill="url(#ray)"/>
      <ellipse cx="32" cy="56" rx="3.5" ry="6.5" fill="url(#ray)"/>
      <ellipse cx="8" cy="32" rx="6.5" ry="3.5" fill="url(#ray)"/>
      <ellipse cx="56" cy="32" rx="6.5" ry="3.5" fill="url(#ray)"/>
      <ellipse cx="14" cy="14" rx="3.5" ry="6.5" fill="url(#ray)" transform="rotate(45 14 14)"/>
      <ellipse cx="50" cy="50" rx="3.5" ry="6.5" fill="url(#ray)" transform="rotate(45 50 50)"/>
      <ellipse cx="50" cy="14" rx="3.5" ry="6.5" fill="url(#ray)" transform="rotate(-45 50 14)"/>
      <ellipse cx="14" cy="50" rx="3.5" ry="6.5" fill="url(#ray)" transform="rotate(-45 14 50)"/>
    </g>
    <circle id="glow" cx="32" cy="32" r="17" fill="url(#core)"/>
    <ellipse cx="26" cy="26" rx="6" ry="4" fill="rgba(255,255,255,0.4)" transform="rotate(-30 26 26)"/>
  </g>
</svg>
