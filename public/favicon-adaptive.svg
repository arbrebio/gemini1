<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
    <style>
        .light { display: inline; }
        .dark { display: none; }
        @media (prefers-color-scheme: dark) {
            .light { display: none; }
            .dark { display: inline; }
        }
    </style>
    <image class="light" href="/favicon.png" width="64" height="64" />
    <image class="dark" href="/favicon-dark.png" width="64" height="64" />
</svg>
