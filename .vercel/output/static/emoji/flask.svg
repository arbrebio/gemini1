<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#022c22" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="neck" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a7f3d0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <style>
    #flask { animation: float 3s ease-in-out infinite; transform-origin: 32px 32px; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  </style>
  <g filter="url(#sh)">
    <g id="flask">
      <!-- Flask body -->
      <path d="M24 26 L14 46 C12 52 16 58 22 58 L42 58 C48 58 52 52 50 46 L40 26 Z" fill="url(#glass)" stroke="#34d399" stroke-width="1.5"/>
      <!-- Liquid inside -->
      <path d="M20 42 L16 52 C14 57 18 58 22 58 L42 58 C46 58 50 57 48 52 L44 42 Z" fill="url(#liquid)" opacity="0.85"/>
      <!-- Bubbles -->
      <circle cx="28" cy="50" r="2.5" fill="rgba(255,255,255,0.4)"/>
      <circle cx="36" cy="46" r="1.8" fill="rgba(255,255,255,0.35)"/>
      <circle cx="32" cy="54" r="1.5" fill="rgba(255,255,255,0.3)"/>
      <!-- Neck -->
      <rect x="26" y="10" width="12" height="18" rx="5" fill="url(#neck)" stroke="#34d399" stroke-width="1.5"/>
      <!-- Rim -->
      <rect x="24" y="8" width="16" height="5" rx="2.5" fill="url(#neck)" stroke="#34d399" stroke-width="1"/>
      <!-- Shine -->
      <ellipse cx="20" cy="40" rx="3" ry="8" fill="rgba(255,255,255,0.3)" transform="rotate(-20 20 40)"/>
    </g>
  </g>
</svg>
