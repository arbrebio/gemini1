<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#7f1d1d" flood-opacity="0.45"/>
    </filter>
    <radialGradient id="berry" cx="38%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="40%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#881337"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <style>
    #sb { animation: float 3s ease-in-out infinite; transform-origin: 32px 36px; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  </style>
  <g filter="url(#sh)">
    <g id="sb">
      <!-- Leaves -->
      <path d="M32 16 Q24 8 18 12 Q24 16 32 20" fill="url(#leaf)"/>
      <path d="M32 16 Q40 8 46 12 Q40 16 32 20" fill="url(#leaf)"/>
      <path d="M32 14 Q32 6 32 10" stroke="url(#leaf)" stroke-width="3" stroke-linecap="round"/>
      <!-- Berry body -->
      <path d="M18 24 C16 30 18 44 32 56 C46 44 48 30 46 24 C42 18 22 18 18 24Z" fill="url(#berry)"/>
      <!-- Seeds -->
      <ellipse cx="26" cy="34" rx="1.5" ry="2" fill="rgba(255,255,255,0.5)" transform="rotate(-10 26 34)"/>
      <ellipse cx="32" cy="28" rx="1.5" ry="2" fill="rgba(255,255,255,0.5)"/>
      <ellipse cx="38" cy="34" rx="1.5" ry="2" fill="rgba(255,255,255,0.5)" transform="rotate(10 38 34)"/>
      <ellipse cx="28" cy="44" rx="1.5" ry="2" fill="rgba(255,255,255,0.5)" transform="rotate(-5 28 44)"/>
      <ellipse cx="36" cy="44" rx="1.5" ry="2" fill="rgba(255,255,255,0.5)" transform="rotate(5 36 44)"/>
      <ellipse cx="32" cy="50" rx="1.5" ry="2" fill="rgba(255,255,255,0.45)"/>
      <!-- Shine -->
      <ellipse cx="24" cy="28" rx="4" ry="7" fill="rgba(255,255,255,0.25)" transform="rotate(-20 24 28)"/>
    </g>
  </g>
</svg>
