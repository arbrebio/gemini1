<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="50%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
  </defs>
  <style>
    #micro { animation: float 3s ease-in-out infinite; transform-origin: 32px 56px; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  </style>
  <g filter="url(#sh)">
    <g id="micro">
      <!-- Base -->
      <rect x="12" y="54" width="40" height="7" rx="3" fill="url(#base)"/>
      <!-- Column arm -->
      <rect x="28" y="30" width="8" height="26" rx="3" fill="url(#metal)"/>
      <!-- Stage -->
      <rect x="20" y="44" width="24" height="5" rx="2" fill="url(#metal)"/>
      <!-- Arm -->
      <path d="M32 30 L42 18 L42 14" stroke="url(#metal)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Eyepiece -->
      <rect x="38" y="8" width="8" height="10" rx="3" fill="url(#metal)"/>
      <rect x="39" y="7" width="6" height="4" rx="2" fill="url(#lens)"/>
      <!-- Objective lens -->
      <rect x="29" y="26" width="6" height="8" rx="3" fill="url(#lens)"/>
      <ellipse cx="32" cy="34" rx="4" ry="2" fill="url(#lens)"/>
      <!-- Shine on arm -->
      <rect x="40" y="15" width="2" height="12" rx="1" fill="rgba(255,255,255,0.4)"/>
    </g>
  </g>
</svg>
