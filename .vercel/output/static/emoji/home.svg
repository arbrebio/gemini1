<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#022c22" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="roof" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="wall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="door" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
  </defs>
  <style>
    #home { animation: float 3s ease-in-out infinite; transform-origin: 32px 50px; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  </style>
  <g filter="url(#sh)">
    <g id="home">
      <!-- Walls -->
      <rect x="10" y="34" width="44" height="24" rx="2" fill="url(#wall)"/>
      <!-- Roof -->
      <path d="M6 36 L32 10 L58 36 Z" fill="url(#roof)"/>
      <!-- Chimney -->
      <rect x="44" y="16" width="7" height="14" rx="1" fill="url(#roof)"/>
      <!-- Window left -->
      <rect x="14" y="38" width="12" height="10" rx="2" fill="#bfdbfe"/>
      <line x1="20" y1="38" x2="20" y2="48" stroke="#60a5fa" stroke-width="1"/>
      <line x1="14" y1="43" x2="26" y2="43" stroke="#60a5fa" stroke-width="1"/>
      <!-- Door -->
      <rect x="28" y="44" width="12" height="14" rx="2" fill="url(#door)"/>
      <circle cx="37" cy="51" r="1.5" fill="#d97706"/>
      <!-- Roof shine -->
      <ellipse cx="20" cy="24" rx="5" ry="10" fill="rgba(255,255,255,0.2)" transform="rotate(-35 20 24)"/>
      <!-- Wall shine -->
      <rect x="11" y="35" width="20" height="5" rx="1" fill="rgba(255,255,255,0.3)"/>
    </g>
  </g>
</svg>
