<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#1e1b4b" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="nose" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="fin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
  </defs>
  <style>
    #rocket { animation: rkt 2.5s ease-in-out infinite; transform-origin: 32px 32px; }
    #flame { animation: flicker 0.4s ease-in-out infinite alternate; transform-origin: 32px 50px; }
    @keyframes rkt { 0%,100%{transform:translateY(0) rotate(-15deg)} 50%{transform:translateY(-6px) rotate(-15deg)} }
    @keyframes flicker { 0%{transform:scaleX(0.8) scaleY(0.9)} 100%{transform:scaleX(1.2) scaleY(1.2)} }
  </style>
  <g filter="url(#sh)">
    <g id="rocket">
      <g id="flame">
        <ellipse cx="32" cy="54" rx="6" ry="9" fill="url(#flame)" opacity="0.9"/>
        <ellipse cx="32" cy="52" rx="3" ry="5" fill="#fef9c3" opacity="0.8"/>
      </g>
      <path d="M24 46 L18 56 L28 50Z" fill="url(#fin)"/>
      <path d="M40 46 L46 56 L36 50Z" fill="url(#fin)"/>
      <rect x="25" y="22" width="14" height="28" rx="7" fill="url(#body)"/>
      <path d="M25 22 Q32 6 39 22Z" fill="url(#nose)"/>
      <circle cx="32" cy="32" r="5" fill="#bfdbfe"/>
      <circle cx="32" cy="32" r="5" fill="none" stroke="#3730a3" stroke-width="1.5"/>
      <ellipse cx="30" cy="30" rx="2" ry="1.5" fill="rgba(255,255,255,0.6)"/>
      <ellipse cx="28" cy="26" rx="2.5" ry="8" fill="rgba(255,255,255,0.25)" transform="rotate(-5 28 26)"/>
    </g>
  </g>
</svg>
