<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#78350f" flood-opacity="0.45"/>
    </filter>
    <radialGradient id="cup" cx="38%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <linearGradient id="stem" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <style>
    #trophy { animation: shimmer 2.5s ease-in-out infinite; transform-origin: 32px 32px; }
    @keyframes shimmer { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.2)} }
  </style>
  <g filter="url(#sh)">
    <g id="trophy">
      <!-- Base -->
      <rect x="20" y="56" width="24" height="5" rx="2" fill="url(#stem)"/>
      <rect x="24" y="53" width="16" height="4" rx="2" fill="url(#stem)"/>
      <!-- Stem -->
      <rect x="28" y="43" width="8" height="12" rx="3" fill="url(#stem)"/>
      <!-- Handles -->
      <path d="M18 22 C10 22 8 30 14 34 L18 34" stroke="url(#cup)" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M46 22 C54 22 56 30 50 34 L46 34" stroke="url(#cup)" stroke-width="4" fill="none" stroke-linecap="round"/>
      <!-- Cup body -->
      <path d="M18 14 L18 36 Q18 44 32 44 Q46 44 46 36 L46 14 Z" fill="url(#cup)"/>
      <!-- Star on cup -->
      <polygon points="32,20 34,26 40,26 35,30 37,36 32,32 27,36 29,30 24,26 30,26" fill="rgba(255,255,255,0.5)"/>
      <!-- Shine -->
      <ellipse cx="24" cy="22" rx="4" ry="8" fill="rgba(255,255,255,0.3)" transform="rotate(-15 24 22)"/>
    </g>
  </g>
</svg>
