<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#022c22" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="50%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="sg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
  </defs>
  <style>
    #shield { animation: pulse 2.5s ease-in-out infinite; transform-origin: 32px 34px; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  </style>
  <g filter="url(#sh)">
    <g id="shield">
      <path d="M32 6 L54 16 L54 34 C54 46 42 56 32 60 C22 56 10 46 10 34 L10 16 Z" fill="url(#sg)"/>
      <path d="M32 6 L54 16 L54 34 C54 46 42 56 32 60 C22 56 10 46 10 34 L10 16 Z" fill="url(#sg2)" opacity="0.25"/>
      <!-- Checkmark -->
      <path d="M20 33 L28 41 L44 23" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Shine -->
      <ellipse cx="22" cy="20" rx="7" ry="10" fill="rgba(255,255,255,0.2)" transform="rotate(-20 22 20)"/>
    </g>
  </g>
</svg>
