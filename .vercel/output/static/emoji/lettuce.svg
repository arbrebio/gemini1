<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#022c22" flood-opacity="0.4"/>
    </filter>
    <radialGradient id="outer" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#14532d"/>
    </radialGradient>
    <radialGradient id="inner" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </radialGradient>
  </defs>
  <style>
    #let { animation: float 3s ease-in-out infinite; transform-origin: 32px 36px; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  </style>
  <g filter="url(#sh)">
    <g id="let">
      <!-- Outer leaves -->
      <path d="M32 56 C18 54 8 44 8 32 C8 18 18 10 32 10 C46 10 56 18 56 32 C56 44 46 54 32 56Z" fill="url(#outer)"/>
      <!-- Wavy ruffled edge -->
      <path d="M12 28 C8 22 10 14 16 12 M20 10 C20 6 26 6 28 10 M36 10 C36 6 42 6 42 10 M48 12 C54 14 56 22 52 28 M56 38 C58 44 54 52 48 54 M36 58 C36 62 28 62 28 58 M16 54 C10 52 6 44 8 38" stroke="#16a34a" stroke-width="2" fill="none" opacity="0.5"/>
      <!-- Mid leaves -->
      <ellipse cx="32" cy="36" rx="18" ry="18" fill="url(#inner)"/>
      <!-- Core -->
      <ellipse cx="32" cy="36" rx="10" ry="10" fill="url(#core)"/>
      <ellipse cx="32" cy="36" rx="5" ry="5" fill="#ecfdf5"/>
      <!-- Leaf veins -->
      <path d="M32 46 L32 26" stroke="#a7f3d0" stroke-width="1" opacity="0.5"/>
      <path d="M32 36 L22 30" stroke="#a7f3d0" stroke-width="0.8" opacity="0.4"/>
      <path d="M32 36 L42 30" stroke="#a7f3d0" stroke-width="0.8" opacity="0.4"/>
      <!-- Shine -->
      <ellipse cx="24" cy="24" rx="6" ry="4" fill="rgba(255,255,255,0.3)" transform="rotate(-30 24 24)"/>
    </g>
  </g>
</svg>
