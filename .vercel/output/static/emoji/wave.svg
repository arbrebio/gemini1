<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#0c4a6e" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="w1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="w2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="w3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
  </defs>
  <style>
    #wave { animation: sway 2.5s ease-in-out infinite; transform-origin: 32px 42px; }
    @keyframes sway { 0%,100%{transform:translateX(0) translateY(0)} 50%{transform:translateX(3px) translateY(-3px)} }
  </style>
  <g filter="url(#sh)">
    <g id="wave">
      <!-- Back wave -->
      <path d="M4 44 Q14 34 24 44 Q34 54 44 44 Q54 34 60 38 L60 58 L4 58 Z" fill="url(#w3)" opacity="0.5"/>
      <!-- Mid wave -->
      <path d="M4 40 Q14 28 24 38 Q34 48 44 38 Q54 28 60 32 L60 52 L4 52 Z" fill="url(#w2)" opacity="0.75"/>
      <!-- Front wave with crest -->
      <path d="M4 34 Q14 22 24 32 Q34 42 44 32 Q54 22 60 26 L60 46 L4 46 Z" fill="url(#w1)"/>
      <!-- White foam crests -->
      <path d="M10 28 Q14 22 18 26" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
      <path d="M30 24 Q34 18 38 22" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
      <path d="M50 20 Q54 14 58 18" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    </g>
  </g>
</svg>
