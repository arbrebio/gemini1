<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#78350f" flood-opacity="0.45"/>
    </filter>
    <radialGradient id="coin" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="ribbon2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <style>
    #medal { animation: shimmer 2.5s ease-in-out infinite; transform-origin: 32px 40px; }
    @keyframes shimmer { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.2)} }
  </style>
  <g filter="url(#sh)">
    <g id="medal">
      <!-- Ribbon left -->
      <path d="M24 8 L28 30 L22 30 Z" fill="url(#ribbon)"/>
      <!-- Ribbon right -->
      <path d="M40 8 L36 30 L42 30 Z" fill="url(#ribbon2)"/>
      <!-- Ribbon knot -->
      <rect x="26" y="6" width="12" height="8" rx="2" fill="url(#ribbon)"/>
      <!-- Medal body -->
      <circle cx="32" cy="42" r="18" fill="url(#coin)"/>
      <!-- Star -->
      <polygon points="32,30 34.5,38 42,38 36,43 38.5,51 32,46 25.5,51 28,43 22,38 29.5,38" fill="rgba(255,255,255,0.5)"/>
      <!-- Shine -->
      <ellipse cx="24" cy="36" rx="5" ry="7" fill="rgba(255,255,255,0.3)" transform="rotate(-20 24 36)"/>
    </g>
  </g>
</svg>
