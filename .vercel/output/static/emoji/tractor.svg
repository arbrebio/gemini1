<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#022c22" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="50%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="cabin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="wheel" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#6b7280"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <radialGradient id="wheel2" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </radialGradient>
  </defs>
  <style>
    #tractor { animation: float 3s ease-in-out infinite; transform-origin: 32px 50px; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
  </style>
  <g filter="url(#sh)">
    <g id="tractor">
      <!-- Big rear wheel -->
      <circle cx="20" cy="46" r="16" fill="url(#wheel)"/>
      <circle cx="20" cy="46" r="10" fill="#374151"/>
      <circle cx="20" cy="46" r="5" fill="url(#wheel2)"/>
      <line x1="20" y1="30" x2="20" y2="62" stroke="#4b5563" stroke-width="1.5"/>
      <line x1="4" y1="46" x2="36" y2="46" stroke="#4b5563" stroke-width="1.5"/>
      <!-- Small front wheel -->
      <circle cx="50" cy="50" r="9" fill="url(#wheel)"/>
      <circle cx="50" cy="50" r="5" fill="#374151"/>
      <circle cx="50" cy="50" r="2.5" fill="url(#wheel2)"/>
      <!-- Body -->
      <path d="M34 46 L34 34 L56 34 L56 46Z" fill="url(#body)"/>
      <!-- Cabin -->
      <rect x="38" y="22" width="16" height="14" rx="2" fill="url(#cabin)"/>
      <!-- Window -->
      <rect x="41" y="25" width="10" height="7" rx="1" fill="#bfdbfe" opacity="0.7"/>
      <ellipse cx="44" cy="27" rx="3" ry="2" fill="rgba(255,255,255,0.4)"/>
      <!-- Hood -->
      <rect x="34" y="30" width="14" height="6" rx="2" fill="url(#body)"/>
      <!-- Exhaust -->
      <rect x="44" y="16" width="4" height="8" rx="2" fill="#374151"/>
    </g>
  </g>
</svg>
