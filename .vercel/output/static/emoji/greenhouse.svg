<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#022c22" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="roof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <style>
    #gh { animation: float 3s ease-in-out infinite; transform-origin: 32px 32px; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  </style>
  <g filter="url(#sh)">
    <g id="gh">
      <!-- Base walls -->
      <rect x="8" y="36" width="48" height="22" rx="1" fill="url(#glass)" stroke="url(#frame)" stroke-width="2"/>
      <!-- Arch roof -->
      <path d="M8 36 Q32 8 56 36Z" fill="url(#glass)" stroke="url(#frame)" stroke-width="2"/>
      <!-- Roof ridge/peak accent -->
      <path d="M32 10 L32 36" stroke="url(#frame)" stroke-width="1.5" opacity="0.7"/>
      <!-- Roof panes -->
      <path d="M20 36 Q26 18 32 10" stroke="url(#frame)" stroke-width="1" fill="none" opacity="0.5"/>
      <path d="M44 36 Q38 18 32 10" stroke="url(#frame)" stroke-width="1" fill="none" opacity="0.5"/>
      <!-- Wall panels -->
      <line x1="22" y1="36" x2="22" y2="58" stroke="url(#frame)" stroke-width="1.2" opacity="0.6"/>
      <line x1="42" y1="36" x2="42" y2="58" stroke="url(#frame)" stroke-width="1.2" opacity="0.6"/>
      <!-- Door -->
      <rect x="27" y="45" width="10" height="13" rx="1" fill="url(#frame)" opacity="0.4"/>
      <!-- Glass shine -->
      <ellipse cx="20" cy="24" rx="5" ry="8" fill="rgba(255,255,255,0.3)" transform="rotate(-40 20 24)"/>
    </g>
  </g>
</svg>
