<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#7f1d1d" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
  </defs>
  <style>
    #target { animation: pulse 2s ease-in-out infinite; transform-origin: 30px 30px; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
  </style>
  <g filter="url(#sh)">
    <g id="target">
      <circle cx="30" cy="30" r="26" fill="#fca5a5"/>
      <circle cx="30" cy="30" r="20" fill="white"/>
      <circle cx="30" cy="30" r="14" fill="#ef4444"/>
      <circle cx="30" cy="30" r="8" fill="white"/>
      <circle cx="30" cy="30" r="4" fill="#b91c1c"/>
    </g>
    <!-- Arrow -->
    <g transform="rotate(-45 42 18)">
      <rect x="30" y="14" width="22" height="4" rx="2" fill="url(#arrow)"/>
      <polygon points="52,10 60,16 52,22" fill="url(#arrow)"/>
      <rect x="28" y="14" width="5" height="4" rx="1" fill="#92400e"/>
    </g>
  </g>
</svg>
