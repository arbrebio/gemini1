<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#022c22" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="half1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="half2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
  </defs>
  <style>
    #pill { animation: float 3s ease-in-out infinite; transform-origin: 32px 32px; }
    @keyframes float { 0%,100%{transform:translateY(0) rotate(-30deg)} 50%{transform:translateY(-4px) rotate(-30deg)} }
  </style>
  <g filter="url(#sh)">
    <g id="pill">
      <!-- Full capsule shape -->
      <rect x="10" y="22" width="44" height="20" rx="10" fill="url(#half1)"/>
      <!-- Right half lighter -->
      <rect x="32" y="22" width="22" height="20" rx="10" fill="url(#half2)"/>
      <!-- Center divider -->
      <line x1="32" y1="22" x2="32" y2="42" stroke="rgba(6,95,70,0.4)" stroke-width="1.5"/>
      <!-- Left shine -->
      <ellipse cx="20" cy="27" rx="6" ry="3" fill="rgba(255,255,255,0.35)" transform="rotate(-10 20 27)"/>
      <!-- Right shine -->
      <ellipse cx="44" cy="27" rx="6" ry="3" fill="rgba(255,255,255,0.3)" transform="rotate(-10 44 27)"/>
    </g>
  </g>
</svg>
