<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#022c22" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="bldg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="roof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="smoke" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="rgba(156,163,175,0)"/>
    </linearGradient>
  </defs>
  <style>
    #factory { animation: float 3s ease-in-out infinite; transform-origin: 32px 50px; }
    #smoke1 { animation: rise 2s ease-in infinite 0s; transform-origin: 14px 16px; }
    #smoke2 { animation: rise 2s ease-in infinite 0.5s; transform-origin: 24px 12px; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes rise { 0%{transform:translateY(0);opacity:0.7} 100%{transform:translateY(-8px);opacity:0} }
  </style>
  <g filter="url(#sh)">
    <g id="factory">
      <!-- Main building -->
      <rect x="6" y="28" width="52" height="30" rx="2" fill="url(#bldg)"/>
      <!-- Roof sawtooth -->
      <path d="M6 28 L14 16 L22 28 L30 16 L38 28 L46 16 L54 28 Z" fill="url(#roof)"/>
      <!-- Skylights -->
      <rect x="16" y="20" width="6" height="8" rx="1" fill="#bfdbfe" opacity="0.8"/>
      <rect x="32" y="20" width="6" height="8" rx="1" fill="#bfdbfe" opacity="0.8"/>
      <!-- Chimneys -->
      <rect x="10" y="8" width="8" height="20" rx="2" fill="url(#bldg)"/>
      <rect x="20" y="4" width="8" height="24" rx="2" fill="url(#bldg)"/>
      <!-- Smoke -->
      <ellipse id="smoke1" cx="14" cy="16" rx="4" ry="6" fill="url(#smoke)" opacity="0.7"/>
      <ellipse id="smoke2" cx="24" cy="12" rx="4" ry="6" fill="url(#smoke)" opacity="0.6"/>
      <!-- Windows -->
      <rect x="12" y="34" width="8" height="8" rx="1" fill="#bfdbfe" opacity="0.8"/>
      <rect x="28" y="34" width="8" height="8" rx="1" fill="#bfdbfe" opacity="0.8"/>
      <rect x="44" y="34" width="8" height="8" rx="1" fill="#bfdbfe" opacity="0.8"/>
      <!-- Door -->
      <rect x="26" y="46" width="12" height="12" rx="1" fill="#064e3b"/>
      <!-- Wall shine -->
      <rect x="7" y="29" width="24" height="5" rx="1" fill="rgba(255,255,255,0.25)"/>
    </g>
  </g>
</svg>
