<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <style>
    #phone { animation: float 3s ease-in-out infinite; transform-origin: 32px 32px; }
    #scrn { animation: glow 2s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes glow { 0%,100%{opacity:0.85} 50%{opacity:1} }
  </style>
  <g filter="url(#sh)">
    <g id="phone">
      <!-- Phone body -->
      <rect x="16" y="6" width="32" height="52" rx="7" fill="url(#body)"/>
      <!-- Screen -->
      <rect id="scrn" x="19" y="12" width="26" height="38" rx="3" fill="url(#screen)"/>
      <!-- Screen content - plant data -->
      <line x1="23" y1="24" x2="41" y2="24" stroke="#34d399" stroke-width="1.5" opacity="0.7"/>
      <line x1="23" y1="28" x2="38" y2="28" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>
      <polyline points="23,42 27,36 31,38 35,30 39,34 43,26" stroke="#4ade80" stroke-width="1.5" fill="none"/>
      <text x="23" y="22" font-size="5" fill="#6ee7b7" font-family="monospace" opacity="0.8">Arbre Bio</text>
      <!-- Home button area -->
      <circle cx="32" cy="54" r="3" fill="#1e293b"/>
      <!-- Notch -->
      <rect x="28" y="9" width="8" height="3" rx="1.5" fill="#0f172a"/>
      <!-- Screen shine -->
      <rect x="20" y="13" width="12" height="6" rx="1" fill="rgba(255,255,255,0.1)"/>
    </g>
  </g>
</svg>
