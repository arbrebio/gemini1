      <path d="M28 24 L32 32 L38 36" stroke="#6b7280" stroke-width="1" fill="none" opacity="0.4"/>
      <path d="M22 38 L28 44" stroke="#6b7280" stroke-width="1" fill="none" opacity="0.4"/>
      <path d="M42 26 L38 34" stroke="#6b7280" stroke-width="1" fill="none" opacity="0.4"/>
    </g>
  </g>
