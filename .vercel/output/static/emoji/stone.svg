      <path d="M14 48 C10 40 12 28 20 20 C28 12 40 12 48 20 C56 28 54 44 50 50 C44 56 20 56 14 48Z" fill="url(#rock)"/>
      <path d="M14 48 C10 40 12 28 20 20 C28 12 40 12 48 20 C56 28 54 44 50 50 C44 56 20 56 14 48Z" fill="url(#shine)"/>
