<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#1c0a00" flood-opacity="0.45"/>
    </filter>
    <radialGradient id="shell" cx="38%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#d6d3d1"/>
      <stop offset="40%" stop-color="#78716c"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </radialGradient>
    <radialGradient id="fiber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a8a29e"/>
      <stop offset="100%" stop-color="#57534e"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <style>
    #coco { animation: float 3s ease-in-out infinite; transform-origin: 32px 36px; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  </style>
  <g filter="url(#sh)">
    <g id="coco">
      <!-- Palm leaves -->
      <path d="M32 18 C22 10 10 12 8 18 C14 18 24 20 32 24" fill="url(#leaf)"/>
      <path d="M32 18 C42 10 54 12 56 18 C50 18 40 20 32 24" fill="url(#leaf)"/>
      <path d="M32 18 C30 8 26 4 20 6 C22 12 28 18 32 24" fill="url(#leaf)"/>
      <!-- Coconut shell -->
      <circle cx="32" cy="40" r="20" fill="url(#shell)"/>
      <!-- Fiber texture lines -->
      <path d="M14 34 Q32 30 50 34" stroke="#57534e" stroke-width="1.5" fill="none" opacity="0.5"/>
      <path d="M12 40 Q32 36 52 40" stroke="#57534e" stroke-width="1.5" fill="none" opacity="0.5"/>
      <path d="M14 46 Q32 42 50 46" stroke="#57534e" stroke-width="1.5" fill="none" opacity="0.5"/>
      <!-- Three eyes -->
      <circle cx="27" cy="36" r="2.5" fill="#0c0a09"/>
      <circle cx="33" cy="34" r="2.5" fill="#0c0a09"/>
      <circle cx="37" cy="38" r="2.5" fill="#0c0a09"/>
      <!-- Shine -->
      <ellipse cx="22" cy="30" rx="5" ry="8" fill="rgba(255,255,255,0.2)" transform="rotate(-30 22 30)"/>
    </g>
  </g>
</svg>
